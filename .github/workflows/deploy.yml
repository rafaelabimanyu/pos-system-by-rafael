name: Deploy Static Login Page to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Set permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚙️ Setup Laravel Environment
        run: |
          cp .env.example .env
          touch database/database.sqlite

      - name: 📥 Install Dependencies
        run: |
          composer install --optimize-autoloader --no-dev --no-interaction --prefer-dist
          npm ci
          
      - name: 🔑 Generate App Key
        run: php artisan key:generate

      - name: 📦 Build Vite Assets
        run: npm run build

      - name: 🛠️ Export Static HTML
        run: |
          mkdir -p dist
          
          # Salin semua hasil build Vite dan aset public
          cp -R public/* dist/
          rm -f dist/index.php
          
          # Render view login Laravel secara langsung menjadi file index.html statis
          php artisan tinker --execute="file_put_contents('dist/index.html', view('auth.login')->render());"
          
          # Sangat Penting: Ubah path /build/ menjadi ./build/ agar CSS/JS tetap jalan di subfolder GitHub Pages
          sed -i 's|/build/|./build/|g' dist/index.html

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
