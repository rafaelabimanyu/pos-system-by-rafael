name: Deploy Static Login Page to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚙️ Setup Laravel Environment
        run: |
          cp .env.example .env
          touch database/database.sqlite

      - name: 📥 Install Dependencies
        run: |
          composer install --optimize-autoloader --no-dev --no-interaction --prefer-dist
          npm ci
          
      - name: 🔑 Generate App Key
        run: php artisan key:generate

      - name: 📦 Build Vite Assets
        run: npm run build

      - name: 🛠️ Export Static HTML & Clean Up
        run: |
          mkdir -p dist
          
          # Salin semua aset public termasuk folder build/ dari Vite
          cp -R public/* dist/
          
          # Bersihkan file server-side Laravel agar tidak mengganggu GitHub Pages
          rm -f dist/index.php dist/.htaccess dist/web.config dist/robots.txt dist/hot
          
          # Render view login Laravel secara langsung menjadi file index.html statis
          php artisan tinker --execute="file_put_contents('dist/index.html', view('auth.login')->render());"
          
          # Fix Asset Paths: Ubah /build/ menjadi ./build/ agar CSS/JS tetap bisa dimuat 
          # baik di root maupun di subfolder repositori GitHub Pages
          sed -i 's|/build/|./build/|g' dist/index.html

      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: auto-build and deploy static frontend to gh-pages"
